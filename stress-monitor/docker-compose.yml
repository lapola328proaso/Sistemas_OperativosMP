version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stress_postgres
    environment:
      POSTGRES_USER: stress_user
      POSTGRES_PASSWORD: stress_pass
      POSTGRES_DB: stress_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stress_user -d stress_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
